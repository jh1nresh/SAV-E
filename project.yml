name: Wanderly
options:
  bundleIdPrefix: com.wanderly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: JC6858UYM9
    CODE_SIGN_STYLE: Automatic

packages:
  Privy:
    url: https://github.com/privy-io/privy-ios
    minorVersion: 2.10.1
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  Wanderly:
    type: application
    platform: iOS
    sources:
      - path: Wanderly
        excludes:
          - Resources/Secrets.plist
          - Resources/Secrets.plist.template
      - path: WanderlyShared
      - path: Wanderly/Resources/Secrets.plist
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: Create Local Secrets.plist
        script: |
          set -euo pipefail
          secrets="${SRCROOT}/Wanderly/Resources/Secrets.plist"
          template="${SRCROOT}/Wanderly/Resources/Secrets.plist.template"
          if [ ! -f "$secrets" ]; then
            cp "$template" "$secrets"
          fi
        inputFiles:
          - $(SRCROOT)/Wanderly/Resources/Secrets.plist.template
        outputFiles:
          - $(SRCROOT)/Wanderly/Resources/Secrets.plist
    dependencies:
      - package: Privy
        product: Privy
      - package: ZIPFoundation
        product: ZIPFoundation
      - target: WanderlyShareExtension
      - target: WanderlyClip
        embed: true
    info:
      path: Wanderly/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: SAV-E
        UIUserInterfaceStyle: Light
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "SAV-E needs your location to show nearby places on the map."
        LSApplicationQueriesSchemes:
          - comgooglemaps
        CFBundleURLTypes:
          - CFBundleURLName: com.wanderly.app
            CFBundleURLSchemes:
              - wanderly
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "21"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Wanderly/Wanderly.entitlements

  WanderlyClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: WanderlyClip
      - path: Wanderly/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.Clip
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "21"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: WanderlyClip/WanderlyClip.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: SAV-E
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSAppClip:
          NSAppClipRequestEphemeralUserNotification: false
          NSAppClipRequestLocationConfirmation: false
  WanderlyShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WanderlyShareExtension
        excludes:
          - Secrets.plist
          - Secrets.plist.template
      - path: WanderlyShared
      - path: WanderlyShareExtension/Secrets.plist
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: Create Local Secrets.plist
        script: |
          set -euo pipefail
          secrets="${SRCROOT}/WanderlyShareExtension/Secrets.plist"
          template="${SRCROOT}/WanderlyShareExtension/Secrets.plist.template"
          if [ ! -f "$secrets" ]; then
            cp "$template" "$secrets"
          fi
        inputFiles:
          - $(SRCROOT)/WanderlyShareExtension/Secrets.plist.template
        outputFiles:
          - $(SRCROOT)/WanderlyShareExtension/Secrets.plist
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.ShareExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "21"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: WanderlyShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: WanderlyShareExtension/WanderlyShareExtension.entitlements

  WanderlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SocialPlacePipelineTests
    dependencies:
      - target: Wanderly
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.tests
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: WanderlyTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Wanderly.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Wanderly"
schemes:
  Wanderly:
    build:
      targets:
        Wanderly: all
        WanderlyTests: [test]
    run:
      config: Debug
    test:
      targets:
        - WanderlyTests
    archive:
      config: Release

  WanderlyShareExtension:
    build:
      targets:
        WanderlyShareExtension: all
    run:
      config: Debug
    archive:
      config: Release

  WanderlyClip:
    build:
      targets:
        WanderlyClip: all
    run:
      config: Debug
    archive:
      config: Release
