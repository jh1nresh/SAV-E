name: SAV-E
options:
  bundleIdPrefix: com.wanderly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: JC6858UYM9
    CODE_SIGN_STYLE: Automatic

packages:
  Privy:
    url: https://github.com/privy-io/privy-ios
    minorVersion: 2.10.1
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  SAVE:
    type: application
    platform: iOS
    sources:
      - path: SAV-E
        excludes:
          - Resources/Secrets.plist
          - Resources/Secrets.plist.template
      - path: SAV-EShared
      - path: SAV-E/Resources/Secrets.plist
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: Create Local Secrets.plist
        script: |
          set -euo pipefail
          secrets="${SRCROOT}/SAV-E/Resources/Secrets.plist"
          template="${SRCROOT}/SAV-E/Resources/Secrets.plist.template"
          if [ ! -f "$secrets" ]; then
            cp "$template" "$secrets"
          fi
        inputFiles:
          - $(SRCROOT)/SAV-E/Resources/Secrets.plist.template
        outputFiles:
          - $(SRCROOT)/SAV-E/Resources/Secrets.plist
    dependencies:
      - package: Privy
        product: Privy
      - package: ZIPFoundation
        product: ZIPFoundation
      - target: SAVEShareExtension
      # SAVEiMessageExtension is a parked spike: not embedded in shipping builds
      # until it has iMessage app icons + is validated. Build it via its own scheme.
      - target: SAVEClip
    info:
      path: SAV-E/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: SAV-E
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "SAV-E needs your location to show nearby places on the map."
        NSMicrophoneUsageDescription: "SAV-E uses the microphone when you talk to the command drawer."
        NSSpeechRecognitionUsageDescription: "SAV-E uses speech recognition to turn your voice into a place search or planning command."
        ITSAppUsesNonExemptEncryption: false
        LSApplicationQueriesSchemes:
          - comgooglemaps
        CFBundleURLTypes:
          - CFBundleURLName: com.wanderly.app
            CFBundleURLSchemes:
              - wanderly
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "69"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SAV-E/SAV-E.entitlements

  SAVEClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: SAV-EClip
      - path: SAV-EShared/SAVEProductionConfig.swift
      - path: SAV-E/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.Clip
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "69"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SAV-EClip/SAV-EClip.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: SAV-E
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSAppClip:
          NSAppClipRequestEphemeralUserNotification: false
          NSAppClipRequestLocationConfirmation: false
  SAVEShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SAV-EShareExtension
        excludes:
          - Secrets.plist
          - Secrets.plist.template
      - path: SAV-EShared
      - path: SAV-EShareExtension/Secrets.plist
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: Create Local Secrets.plist
        script: |
          set -euo pipefail
          secrets="${SRCROOT}/SAV-EShareExtension/Secrets.plist"
          template="${SRCROOT}/SAV-EShareExtension/Secrets.plist.template"
          if [ ! -f "$secrets" ]; then
            cp "$template" "$secrets"
          fi
        inputFiles:
          - $(SRCROOT)/SAV-EShareExtension/Secrets.plist.template
        outputFiles:
          - $(SRCROOT)/SAV-EShareExtension/Secrets.plist
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.ShareExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "69"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: SAV-EShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SAV-EShareExtension/SAV-EShareExtension.entitlements

  SAVEiMessageExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SAV-EiMessage
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.iMessage
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "69"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: SAV-EiMessage/Info.plist
        CODE_SIGN_ENTITLEMENTS: SAV-EiMessage/SAV-EiMessage.entitlements

  SAVETests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SocialPlacePipelineTests
    dependencies:
      - target: SAVE
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.tests
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: SAVETests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SAVE.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SAVE"

  SAVEUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/SAVEUITests
    dependencies:
      - target: SAVE
    settings:
      base:
        DEVELOPMENT_TEAM: JC6858UYM9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.wanderly.app.uitests
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: SAVEUITests
schemes:
  SAV-E:
    build:
      targets:
        SAVE: all
        SAVETests: [test]
        SAVEUITests: [test]
    run:
      config: Debug
    test:
      targets:
        - SAVETests
        - SAVEUITests
    archive:
      config: Release

  Wanderly:
    build:
      targets:
        SAVE: all
        SAVETests: [test]
        SAVEUITests: [test]
    run:
      config: Debug
    test:
      targets:
        - SAVETests
        - SAVEUITests
    archive:
      config: Release

  SAVEShareExtension:
    build:
      targets:
        SAVEShareExtension: all
    run:
      config: Debug
    archive:
      config: Release

  SAVEClip:
    build:
      targets:
        SAVEClip: all
    run:
      config: Debug
    archive:
      config: Release

  SAVEiMessageExtension:
    build:
      targets:
        SAVEiMessageExtension: all
    run:
      config: Debug
    archive:
      config: Release
